<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>__SALON_NAME__ — Friseursalon</title>
<style>
  :root{--pink:#FF1F6E;--dark:#0d0d12;--card:#1c1c26;--line:#2a2a35;--muted:#9a9aa8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);color:#f2f2f5;font-family:'Segoe UI',sans-serif;line-height:1.6;}
  header{padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}
  .logo{font-weight:800;font-size:20px;}
  .logo span{color:var(--pink);}
  .hero{padding:80px 24px 50px;text-align:center;max-width:700px;margin:0 auto;}
  .hero h1{font-size:36px;font-weight:800;margin-bottom:14px;}
  .hero p{color:var(--muted);margin-bottom:26px;}
  .cta{display:inline-block;background:var(--pink);color:#fff;padding:13px 30px;border-radius:30px;text-decoration:none;font-weight:700;}
  .services{max-width:800px;margin:50px auto;padding:0 24px;}
  .services h2{margin-bottom:20px;color:var(--pink);}
  .svc-item{display:flex;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--line);}
  .svc-item .price{color:var(--pink);font-weight:700;}
  .book{max-width:420px;margin:50px auto;padding:24px;background:var(--card);border:1px solid var(--line);border-radius:16px;}
  .book input,.book select{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:1px solid var(--line);background:#16161d;color:#fff;}
  .book button{width:100%;background:var(--pink);color:#fff;border:none;padding:13px;border-radius:10px;font-weight:700;cursor:pointer;}
  footer{text-align:center;padding:30px;color:var(--muted);font-size:13px;border-top:1px solid var(--line);}
  #status{margin-top:10px;text-align:center;font-size:13px;}
</style>
</head>
<body>
<header>
  <div class="logo">__SALON_NAME__</div>
  <div style="color:var(--muted);font-size:13px">__SALON_ADDRESS__</div>
</header>

<section class="hero">
  <h1>__HERO_TITLE__ <!-- مثال: «سبک شما، هنر ما» --></h1>
  <p>__HERO_SUBTITLE__</p>
  <a href="#book" class="cta">Termin buchen</a>
</section>

<section class="services">
  <h2>Leistungen &amp; Preise</h2>
  <div id="svcList">
    <!-- نمونه — با خدمات و قیمت واقعی جایگزین شود -->
    <div class="svc-item"><span>__SERVICE_1_NAME__</span><span class="price">€__SERVICE_1_PRICE__</span></div>
    <div class="svc-item"><span>__SERVICE_2_NAME__</span><span class="price">€__SERVICE_2_PRICE__</span></div>
    <div class="svc-item"><span>__SERVICE_3_NAME__</span><span class="price">€__SERVICE_3_PRICE__</span></div>
  </div>
</section>

<section class="book" id="book">
  <h2 style="margin-bottom:16px">Termin anfragen</h2>
  <form id="bookForm">
    <input name="customer_name" placeholder="Name" required>
    <input name="customer_phone" placeholder="Telefon" required>
    <select name="service_name" required>
      <option value="">— Leistung wählen —</option>
      <option>__SERVICE_1_NAME__</option>
      <option>__SERVICE_2_NAME__</option>
      <option>__SERVICE_3_NAME__</option>
    </select>
    <input name="appointment_date" type="date" required>
    <input name="appointment_time" type="time" required>
    <button type="submit">Anfrage senden</button>
    <div id="status"></div>
  </form>
</section>

<footer>© 2026 __SALON_NAME__ · __SALON_ADDRESS__ · __SALON_PHONE__</footer>

<script>
const SUPABASE_URL = "https://owgfhhkmlkdpjqlwavsx.supabase.co";
const SUPABASE_KEY = "sb_publishable_xGeaZikMQI8MclH3CnClBg_INoBJ7F-";

document.getElementById('bookForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const status = document.getElementById('status');
  const data = Object.fromEntries(new FormData(this).entries());
  status.textContent = 'Wird gesendet...';
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/salon_appointments`,{
      method:'POST',
      headers:{apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json', Prefer:'return=representation'},
      body: JSON.stringify({...data, status:'pending'})
    });
    if(res.ok){ status.textContent='✅ Danke! Wir bestätigen in Kürze.'; status.style.color='#4caf50'; this.reset(); }
    else { status.textContent='⚠️ Fehler, bitte erneut versuchen.'; status.style.color='#f44336'; }
  }catch(err){ status.textContent='⚠️ Fehler.'; status.style.color='#f44336'; }
});
</script>
</body>
</html>
